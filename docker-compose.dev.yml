services:
  # Main database service using PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: devops-event-db
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-events_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-events_db} -h localhost"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # Application service running the FastAPI backend
  python-api:
    build:
      context: ./python_api
      dockerfile: Dockerfile
    container_name: devops-event-python-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      APP_NAME: ${APP_NAME:-DevOps Event System API}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-events_db}
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    ports:
      - "8000:8000"
    volumes:
      - ./python_api/app:/app/app
      - ./python_api/alembic:/app/alembic
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  # Prometheus service for monitoring
  prometheus:
    image: prom/prometheus:latest # TODO: use a specific version in production for consistency
    container_name: devops-event-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - prometheus_data:/prometheus
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090" # exposed only for local observability, in production this should not be exposed publicly
    depends_on:
      python-api:
        condition: service_started
    networks:
      - backend
  
  # Grafana service for visualizing metrics
  grafana:
    image: grafana/grafana:12.1.1
    container_name: devops-event-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    env_file:
      - ./.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards-json
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - backend

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  backend:
    driver: bridge